{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Тёплый хлеб{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-logo">Тёплый хлеб</a>
        <div class="nav-links">
            <a href="{% url 'home' %}" class="nav-link">Главная</a>
            <a href="{% url 'profile' %}" class="nav-link nav-avatar" title="Мой аккаунт">
                {% if user.profile.avatar %}
                <img src="{{ user.profile.avatar.url }}" alt="avatar">
                {% else %}
                <span class="avatar-placeholder">{{ user.profile.nickname|first }}</span>
                {% endif %}
            </a>
        </div>
    </nav>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
